# Optional convenience compose for the backend API.
# Security tools (slither/mythril/semgrep/foundry) are NOT installed in this base
# image — build a custom image or run install_tools.sh on the host for full scans.
services:
  backend:
    image: python:3.11-slim
    working_dir: /app
    command: bash -lc "pip install -r requirements.txt && python -m backend.main"
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./:/app
