name: Regression

on:
  push:
  pull_request:

jobs:
  detector-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run focused regression tests
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest tests/test_exploit_benchmark.py tests/test_storage_layout.py tests/test_flashloan_sim.py -q
      - name: Run detector fixture benchmark
        run: python -m backend.main benchmark-detectors --profile ultra-deep-v2 --out detector-regression.json
      - name: Upload detector regression report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detector-regression
          path: detector-regression.json
