# BulkAuditAI local Solidity rules.
# Written in `generic` mode with pattern-regex so they run on any Semgrep
# version without requiring the Solidity language pack. These surface
# CANDIDATES for the detectors / AI layer — they are intentionally noisy.
rules:
  - id: solidity-tx-origin-auth
    languages: [generic]
    severity: WARNING
    message: "Use of tx.origin (possible phishing/auth bypass if used for authorization)."
    paths:
      include: ["*.sol"]
    patterns:
      - pattern-regex: "tx\\.origin"

  - id: solidity-delegatecall
    languages: [generic]
    severity: ERROR
    message: "delegatecall present — verify target is not user-controlled and storage layout is safe."
    paths:
      include: ["*.sol"]
    patterns:
      - pattern-regex: "\\.\\s*delegatecall\\s*\\("

  - id: solidity-low-level-call
    languages: [generic]
    severity: WARNING
    message: "Low-level .call present — check return value and whether target/data are user-controlled."
    paths:
      include: ["*.sol"]
    patterns:
      - pattern-regex: "\\.\\s*call\\s*[\\{(]"

  - id: solidity-selfdestruct
    languages: [generic]
    severity: ERROR
    message: "selfdestruct/suicide present — contract can be destroyed; verify access control."
    paths:
      include: ["*.sol"]
    patterns:
      - pattern-regex: "(selfdestruct|suicide)\\s*\\("

  - id: solidity-permit-to-msg-sender
    languages: [generic]
    severity: ERROR
    message: "permit(owner, msg.sender, ...) — allowance granted to caller; review for permit-front-running misuse."
    paths:
      include: ["*.sol"]
    patterns:
      - pattern-regex: "permit\\s*\\([^)]*msg\\.sender"

  - id: solidity-upgrade-function
    languages: [generic]
    severity: WARNING
    message: "Upgrade-style function declared — confirm it carries access control (onlyOwner/onlyRole/timelock)."
    paths:
      include: ["*.sol"]
    patterns:
      - pattern-regex: "function\\s+(upgradeToAndCall|upgradeAndCall|upgradeTo|upgrade|setImplementation|changeImplementation|changeProxyAdmin|diamondCut)\\s*\\("

  - id: solidity-mint-function
    languages: [generic]
    severity: INFO
    message: "mint() declared — confirm access control and supply invariants."
    paths:
      include: ["*.sol"]
    patterns:
      - pattern-regex: "function\\s+_?mint\\w*\\s*\\("

  - id: solidity-withdraw-arbitrary-recipient
    languages: [generic]
    severity: WARNING
    message: "withdraw-style function takes an address parameter — verify recipient cannot be attacker-chosen without auth."
    paths:
      include: ["*.sol"]
    patterns:
      - pattern-regex: "function\\s+(withdraw|claim|redeem|rescue|sweep)\\w*\\s*\\([^)]*address[^)]*\\)"

  - id: solidity-transferfrom-no-balance-delta
    languages: [generic]
    severity: WARNING
    message: "transferFrom deposit path may account nominal amount without measuring received balance delta."
    paths:
      include: ["*.sol"]
    patterns:
      - pattern-regex: '(?s)transferFrom\s*\([^;]+\).*(_mint\s*\(|shares\s*=|balances?\s*\[)'

  - id: solidity-merkle-claim-weak-binding
    languages: [generic]
    severity: WARNING
    message: "Merkle claim path moves value; verify leaf binds recipient, amount, token/domain, and nonce/index."
    paths:
      include: ["*.sol"]
    patterns:
      - pattern-regex: '(?s)(MerkleProof|merkle).*keccak256\s*\(.*(transfer|safeTransfer|_mint|claim)'

  - id: solidity-bitmap-claim-shift-without-word-index
    languages: [generic]
    severity: WARNING
    message: "Claim bitmap shift uses a raw index; verify modulo/word-index handling prevents aliasing."
    paths:
      include: ["*.sol"]
    patterns:
      - pattern-regex: '(claimed|bitmap|bitMap|claimedBitMap)[\s\S]{0,500}1\s*<<\s*(index|idx|i)\b'

  - id: solidity-bridge-message-key
    languages: [generic]
    severity: WARNING
    message: "Bridge/message processed-key path; verify replay key binds source chain, sender, nonce, and destination."
    paths:
      include: ["*.sol"]
    patterns:
      - pattern-regex: '(?s)(processed|consumed|executed|used)\s*\[[^\]]+\]\s*=\s*true.*keccak256\s*\(\s*abi\.encode'

  - id: solidity-chainlink-latest-round-data
    languages: [generic]
    severity: WARNING
    message: "Chainlink latestRoundData used; verify updatedAt, answeredInRound, positive answer, and L2 sequencer checks."
    paths:
      include: ["*.sol"]
    patterns:
      - pattern-regex: 'latestRoundData\s*\('

  - id: solidity-address-this-balance-accounting
    languages: [generic]
    severity: WARNING
    message: "address(this).balance used in accounting; forced ETH can skew share/reward/solvency math."
    paths:
      include: ["*.sol"]
    patterns:
      - pattern-regex: 'address\s*\(\s*this\s*\)\.balance'

  - id: solidity-payable-multicall-delegatecall
    languages: [generic]
    severity: ERROR
    message: "Payable multicall/delegatecall path; verify msg.value/cached-state cannot be reused across inner calls."
    paths:
      include: ["*.sol"]
    patterns:
      - pattern-regex: '(?s)function\s+\w*(multicall|batch)\w*\s*\([^)]*\)[^{;]*payable[\s\S]{0,1200}delegatecall\s*\('

  - id: solidity-trycatch-swallowed-finalization
    languages: [generic]
    severity: WARNING
    message: "try/catch finalization path; verify failed external execution is not marked consumed/finalized."
    paths:
      include: ["*.sol"]
    patterns:
      - pattern-regex: '(?s)(processed|consumed|executed|claimed|used)\s*\[[^\]]+\]\s*=\s*true[\s\S]{0,800}try\s+[^{}]+\{[\s\S]{0,800}catch\s*(\([^)]*\))?\s*\{'

  - id: solidity-batch-loop-value-mutation
    languages: [generic]
    severity: WARNING
    message: "Batch loop mutates/transfers value; verify duplicate ids/items are rejected or deduplicated."
    paths:
      include: ["*.sol"]
    patterns:
      - pattern-regex: '(?s)function\s+\w*(batch|multi|claim|execute|withdraw)\w*\s*\([^)]*\[\][^)]*\)[^{;]*\{[\s\S]{0,1400}for\s*\([\s\S]{0,1400}(transfer|safeTransfer|_mint|_burn|\+=|-=)'

  - id: solidity-create2-address-only-trust
    languages: [generic]
    severity: WARNING
    message: "CREATE2/code-existence trust path; verify expected runtime code hash is bound, not only address/code length."
    paths:
      include: ["*.sol"]
    patterns:
      - pattern-regex: '(?s)(create2|CREATE2|salt|extcodesize|\.code\.length)[\s\S]{0,800}(allow|trust|whitelist|implementation|module|adapter|strategy|target)'


  - id: solidity-amm-pair-burn-sync-reserve-desync
    languages: [generic]
    severity: ERROR
    message: "Pair balance is burned/transferred before sync(); verify reserve-desync / burn-debt exploitability."
    paths:
      include: ["*.sol"]
    patterns:
      - pattern-regex: '(?s)(_update|_transfer|_burn|burn)\s*\(\s*\w*(pair|pool|uniswap|pancake|amm)\w*[\s\S]{0,700}\.\s*(sync|skim)\s*\('

  - id: solidity-erc4626-dual-asset-redeem-double-count
    languages: [generic]
    severity: ERROR
    message: "ERC4626 totalAssets values a non-asset leg while redeem transfers the non-asset separately; check double payment."
    paths:
      include: ["*.sol"]
    patterns:
      - pattern-regex: '(?s)function\s+totalAssets\s*\([^)]*\)[\s\S]{0,1800}(nonAsset|token0|token1|weth|quote)[\s\S]{0,2200}function\s+(redeem|withdraw|exit)\w*\s*\([^)]*\)[\s\S]{0,1800}(convertToAssets|previewRedeem|totalAssets)[\s\S]{0,1000}(nonAsset|token0|token1|weth|quote)[\s\S]{0,500}(safeTransfer|transfer)\s*\('


  - id: solidity-redemption-math-after-supply-burn
    languages: [generic]
    severity: ERROR
    message: "Redeem/withdraw burns shares before computing payout from totalSupply/assets; check over-redemption math."
    paths:
      include: ["*.sol"]
    patterns:
      - pattern-regex: '(?s)function\s+\w*(redeem|withdraw|exit)\w*\s*\([^)]*\)[^{;]*\{[\s\S]{0,900}(_burn\s*\(|(_?totalSupply|supply)\s*(-=|=))[\s\S]{0,1200}(totalSupply\s*\(|_totalSupply|balanceOf\s*\(\s*address\s*\(\s*this\s*\)\s*\)|totalAssets\s*\()[\s\S]{0,900}(transfer|safeTransfer|call\s*\{)'

  - id: solidity-whitelist-claim-no-replay-marker
    languages: [generic]
    severity: WARNING
    message: "Whitelist/signature claim mints/transfers value; verify claimed/nullifier/nonce marker blocks replay."
    paths:
      include: ["*.sol"]
    patterns:
      - pattern-regex: '(?s)function\s+\w*(claim|whitelist|allowlist|airdrop|mint)\w*\s*\([^)]*\)[^{;]*\{[\s\S]{0,1200}(MerkleProof|merkle|ecrecover|ECDSA|signature|signer|whitelist|allowlist)[\s\S]{0,1200}(_mint\s*\(|transfer\s*\()'

  - id: solidity-live-balance-reward-without-checkpoint
    languages: [generic]
    severity: WARNING
    message: "Reward/stake path uses live balanceOf; verify rewardDebt/checkpoint/locked stake prevents balance-movement inflation."
    paths:
      include: ["*.sol"]
    patterns:
      - pattern-regex: '(?s)function\s+\w*(claim|reward|harvest|settle|stake|bet)\w*\s*\([^)]*\)[^{;]*\{[\s\S]{0,1400}balanceOf\s*\(\s*(msg\.sender|account|user|player)[\s\S]{0,1400}(reward|points|payout|transfer|_mint)'


  - id: solidity-rfq-signer-inventory-mismatch
    languages: [generic]
    severity: ERROR
    message: "RFQ/signature flow transfers from inventory/maker/from; verify signer is authorized by that exact spender."
    paths:
      include: ["*.sol"]
    patterns:
      - pattern-regex: '(?s)(ecrecover|ECDSA|isValidSignature|signer)[\s\S]{0,1800}(allowed|approved|valid|receiver|taker)[\s\S]{0,1800}(transferFrom|safeTransferFrom)\s*\(\s*(order\.)?(inventory|maker|from|src|source|owner)\b'

  - id: solidity-permissionless-batch-executor
    languages: [generic]
    severity: ERROR
    message: "Externally callable batch/run executor performs low-level calls; verify auth/signature/nonce/allowlist."
    paths:
      include: ["*.sol"]
    patterns:
      - pattern-regex: '(?s)function\s+(run|batch|batchCall|executeBatch|multicall|aggregate)\w*\s*\([^)]*(address|bytes|Call|Transaction)[^)]*\[\][^)]*\)\s*(external|public)[^{;]*\{[\s\S]{0,1800}for\s*\([\s\S]{0,1800}\.\s*(call|delegatecall)\s*[\({]'

  - id: solidity-spot-priced-leverage-liquidation-cap
    languages: [generic]
    severity: WARNING
    message: "Leverage/open-position path uses spot price and contract has liquidation cap; check BoostHook-style bad debt."
    paths:
      include: ["*.sol"]
    patterns:
      - pattern-regex: '(?s)(MAX_?LIQ|liquidations?ThisBlock|liquidations?InBlock|maxLiquidations)[\s\S]{0,5000}function\s+\w*(openLong|leverage|boost|borrow|openPosition)\w*\s*\([^)]*\)[\s\S]{0,1600}(slot0\s*\(|sqrtPriceX96|getCurrentPrice|spotPrice)[\s\S]{0,1600}(debt|borrow|loan|position|margin)'
